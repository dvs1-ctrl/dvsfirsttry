.hdr-right{display:flex;align-items:center;gap:12px}
.theme-toggle{width:34px;height:34px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);color:var(--muted2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;transition:all .15s}
.theme-toggle:hover{border-color:var(--accent);color:var(--accent)}
.set-prev{color:var(--faint)}
.circ-log{color:var(--faint)}
/* splash */
.fs-splash{position:fixed;inset:0;z-index:1000;max-width:480px;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:34px;background:radial-gradient(120% 80% at 50% 22%,#213139,#141f25 60%,#0f171c);transition:opacity .55s ease}
[data-theme="light"] .fs-splash{background:radial-gradient(120% 80% at 50% 20%,#faf7f0,#efe9dd 70%,#e7e0d0)}
.fs-splash.hide{opacity:0;pointer-events:none}
.fs-splash-badge{position:relative;width:216px;height:216px;display:flex;align-items:center;justify-content:center}
.fs-splash-glow{position:absolute;left:50%;top:50%;width:262px;height:262px;border-radius:50%;transform:translate(-50%,-50%);background:radial-gradient(circle,rgba(210,171,102,.28),transparent 62%);animation:fsGlow 4.5s ease-in-out infinite}
.fs-splash-atlas{width:206px;height:206px;object-fit:contain;filter:drop-shadow(0 8px 24px rgba(0,0,0,.5));animation:fsRise 1.1s cubic-bezier(.2,.7,.2,1) both;position:relative}
[data-theme="light"] .fs-splash-badge{background:radial-gradient(circle at 38% 32%,#38505b,#2f444e 70%);border-radius:50%;box-shadow:0 22px 48px -14px rgba(47,68,78,.55)}
[data-theme="light"] .fs-splash-glow{display:none}
[data-theme="light"] .fs-splash-atlas{width:164px;height:164px;filter:none}
.fs-splash-wm{font-family:'Saira Condensed',sans-serif;font-style:italic;font-weight:900;font-size:58px;line-height:.82;text-transform:uppercase;color:var(--text);animation:fsRise 1.1s .2s cubic-bezier(.2,.7,.2,1) both}
.fs-splash-tag{font-family:'Archivo',sans-serif;font-weight:800;font-size:11px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);margin-top:18px;animation:fsRise 1.1s .35s cubic-bezier(.2,.7,.2,1) both}
.fs-splash-rule{position:absolute;bottom:48px;width:120px;height:3px;background:var(--gold);border-radius:2px;transform-origin:left;animation:fsLine 1.4s .6s ease both}
@keyframes fsRise{0%{opacity:0;transform:translateY(18px) scale(.94)}100%{opacity:1;transform:none}}
@keyframes fsGlow{0%,100%{opacity:.35}50%{opacity:.62}}
@keyframes fsLine{0%{transform:scaleX(0)}100%{transform:scaleX(1)}}
/* home */
.fs-home{position:fixed;inset:0;z-index:900;max-width:480px;margin:0 auto;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch}
.fs-home.hide{opacity:0;pointer-events:none;transition:opacity .35s ease}
.fs-hero-btn{margin:16px 18px 18px;width:calc(100% - 36px);padding:15px;border:none;border-radius:12px;background:var(--gold);color:var(--on-accent);font-family:'Archivo',sans-serif;font-weight:900;font-size:15px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:opacity .15s}
.fs-hero-btn:hover{opacity:.9}
.fs-wpill{flex:1;text-align:center;padding:9px 0;border-radius:8px;border:1px solid var(--border);color:var(--muted2);font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;background:transparent;transition:all .15s}
.fs-wpill.on{background:var(--gold);color:var(--on-accent);border-color:var(--gold)}
.fs-dpip{flex:1;padding:10px 4px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;transition:all .15s}
.fs-dpip.on{border-color:var(--gold);background:var(--surface2)}
/* data panel */
.fs-datapanel{margin:28px 16px 20px;padding:16px;background:var(--surface);border:1px solid var(--border);border-radius:12px}
.fs-datapanel-label{font-family:'Archivo',sans-serif;font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.fs-datapanel-row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.fs-sessioncount{font-size:12px;color:var(--muted2);flex:1;min-width:120px}
.fs-databtn{padding:9px 14px;background:transparent;border:1px solid var(--border2);color:var(--muted2);font-family:'Archivo',sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:8px;cursor:pointer;transition:all .15s}
.fs-databtn:hover{border-color:var(--accent);color:var(--accent)}
.fs-databtn.danger{border-color:rgba(200,90,70,.35);color:#c0685a}
.fs-databtn.danger:hover{border-color:#c0685a;color:#c0685a}
.fs-datanote{font-size:11px;color:var(--faint);margin-top:12px;line-height:1.5}
</style>
</head>
<body>
<div id="fsSplash" class="fs-splash">
  <div class="fs-splash-badge"><span class="fs-splash-glow"></span><img class="fs-splash-atlas" data-fs-atlas alt=""></div>
  <div style="text-align:center"><div class="fs-splash-wm">Full<br>Spectrum</div><div class="fs-splash-tag">Fitter&nbsp;&middot;&nbsp;Faster&nbsp;&middot;&nbsp;Stronger</div></div>
  <div class="fs-splash-rule"></div>
</div>
<div id="fsHome" class="fs-home" style="display:none"></div>

<div class="hdr">
  <div class="hdr-top">
    <div class="logo-lock" onclick="fsOpenHome()"><img class="logo-mark" data-fs-atlas alt="Full Spectrum"><span class="logo-wm">Full Spectrum</span></div>
    <div class="hdr-right">
      <div class="prog-name">Dec '25 Program</div>
      <button class="theme-toggle" id="themeToggle" onclick="fsToggleTheme()" aria-label="Toggle light or dark theme">☾</button>
    </div>
  </div>
  <div class="week-sel" id="weekSel">
    <button class="wbtn" onclick="setWeek(1)">Week 1</button>
    <button class="wbtn" onclick="setWeek(2)">Week 2</button>
    <button class="wbtn" onclick="setWeek(3)">Week 3</button>
    <button class="wbtn" onclick="setWeek(4)">Week 4</button>
  </div>
</div>

<div class="day-tabs">
  <button class="dtab active" onclick="setDay(0)">Day 1</button>
  <button class="dtab" onclick="setDay(1)">Day 2</button>
  <button class="dtab" onclick="setDay(2)">Day 3</button>
  <button class="dtab" onclick="setDay(3)">Day 4</button>
</div>

<div class="content" id="content"></div>

<div class="rest-bar hidden" id="restBar">
  <div class="rest-info">
    <div class="rest-lbl">Rest</div>
    <div class="rest-cd" id="restCd">2:00</div>
  </div>
  <div class="rest-progress"><div class="rest-fill" id="restFill" style="width:100%"></div></div>
  <button class="rest-skip" onclick="skipRest()">Skip</button>
</div>

<div class="modal-ov" id="modalOv" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modalTitle">Exercise</div>
    <div class="modal-gif">
      <div style="font-size:32px">▶</div>
      <p style="font-size:13px;text-align:center;line-height:1.4">Exercise demo will appear here.<br>Add GIF or video URL per exercise.</p>
    </div>
    <button class="modal-close" onclick="closeModal()">Close</button>
  </div>
</div>

<script>
const PROGRAM = {
  days: [
    {
      label:"Day 1",
      cardio:{ machine:"Treadmill", duration:"10 min", target:"1.5% incline, Spd 10–10.5",
        fields:["Speed","Calories","Distance (km)","Time (min)"],
        keys:["speed","cals","dist","time"], units:["","cal","km","min"] },
      mobility:"Modified Inchworm",
      primary:{ name:"DB Split Squat", warmupType:"bodyweight", sets:[3,3,3,4], reps:"8/leg", weights:["10","10",null,null], rest:120, maxReps:[10,8,null,null], dates:["26/11/25","1/03/26",null,null] },
      assistance:[
        { type:"superset", rest:90, exercises:[
          { name:"Assisted Chin Ups", sets:3, reps:"8–10", log:["80kg(10,7,7)","80kg(8,8)",null,null] },
          { name:"BW Dips", sets:3, reps:"max", log:["(6,6,6)","(6,6)",null,null] }
        ]},
        { type:"superset", rest:90, exercises:[
          { name:"SwB Hamstring Curls", sets:3, reps:"10–12", log:["(12,12,9)",null,null,null] },
          { name:"Plank", sets:3, reps:"30–60 sec", log:["(35s,35s,35s)",null,null,null] }
        ]}
      ]
    },
    {
      label:"Day 2",
      cardio:{ machine:"Rower", duration:"10 min", target:"2.05–2.10 s/500m",
        fields:["Distance (m)","Pace (s/500m)","Calories","Time (min)"],
        keys:["dist","pace","cals","time"], units:["m","s/500m","cal","min"] },
      mobility:null,
      primary:{ name:"Pause Bench Press", warmupType:"barbell", sets:[3,3,4,4], reps:8, weights:["65","65",null,null], rest:120, maxReps:[8,"6,5,8",null,null], dates:["28/11/25","13/01/26",null,null] },
      assistance:[
        { type:"superset", rest:90, exercises:[
          { name:"Goblet Squat", sets:3, reps:20, log:["8kg,12kg,12kg","12kg,16kg",null,null] },
          { name:"Lying Leg Raise", sets:3, reps:"10–12", log:["(12,8,8)","(10,10)",null,null] }
        ]},
        { type:"superset", rest:90, exercises:[
          { name:"Kroc Row", sets:2, reps:25, log:["14kg(25…)",null,null,null] },
          { name:"Lying DB Extensions", sets:2, reps:25, log:["10kg–8kg",null,null,null] }
        ]}
      ]
    },
    {
      label:"Day 3",
      cardio:{ machine:"Stationary Bike", duration:"10 min", target:"ld12 / 95–100 rpm",
        fields:["Distance (km)","Calories","RPM (avg)","Time (min)"],
        keys:["dist","cals","rpm","time"], units:["km","cal","rpm","min"] },
      mobility:null,
      primary:{ name:"Deadlift", warmupType:"barbell", sets:[3,3,4,4], reps:5, weights:["80","70",null,null], rest:120, maxReps:[8,10,null,null], dates:["12/02/25","18/04/26",null,null] },
      assistance:[
        { type:"circuit", rest:0, rounds:[21,15,10,6], timeTrial:true, log:["13:30 min","10:29 min",null,null],
          exercises:[
            { name:"Box Jumps",         diffLabel:"Box height", diffUnit:"inch", diffPlaceholder:"e.g. 20" },
            { name:"TRX Row",           diffLabel:"Angle / band", diffUnit:"",   diffPlaceholder:"e.g. 45°" },
            { name:"KB Swing",          diffLabel:"Weight",     diffUnit:"kg",   diffPlaceholder:"e.g. 12" },
            { name:"Push Ups",          diffLabel:"Variation",  diffUnit:"",     diffPlaceholder:"e.g. Incline" }
          ]
        }
      ]
    },
    {
      label:"Day 4",
      cardio:{ machine:"Stepper", duration:"10 min", target:"Spd 7 / 40 floors",
        fields:["Floors","Calories","Speed","Time (min)"],
        keys:["floors","cals","speed","time"], units:["floors","cal","","min"] },
      mobility:"Quadruped & T-Spine",
      primary:{ name:"Incline Bench Press", warmupType:"barbell", sets:[3,3,4,4], reps:[20,20,15,15], weights:["40","32",null,null], rest:120, maxReps:[20,20,null,null], dates:["12/12/25","26/04/26",null,null] },
      assistance:[
        { type:"superset", rest:90, exercises:[
          { name:"Hyperextensions", sets:3, reps:12, log:["5…","40deg(6,6,6)",null,null] },
          { name:"Bicep Curl 21s", sets:3, reps:"21s", log:["10kg","8kg",null,null] }
        ]},
        { type:"superset", rest:90, exercises:[
          { name:"Machine Pec Fly", sets:3, reps:"15–20", log:[null,"27kg(20,20,20)",null,null] },
          { name:"Machine Rear Delt Fly", sets:3, reps:"15–20", log:[null,"18kg(20,20,20)",null,null] }
        ]}
      ]
    }
  ]
};

let currentDay = 0, currentWeek = null;
let restTimer = null, restRemaining = 0, restTotal = 0;
let mobTimer = null, mobRemaining = 300, mobRunning = false;

// ── PERSISTENT STORAGE ──────────────────────────────────────────────────────
// All data lives in localStorage under the prefix "fst_" (Full Spectrum Training)
// Keys are namespaced: fst_d{day}_w{week}_{path}  or  fst_weighIn
const LS_PREFIX = 'fst_';

function lsKey(path) { return LS_PREFIX + path; }

// store: thin wrapper — reads/writes go straight to localStorage
const store = {
  _get(k)    { try { const v = localStorage.getItem(lsKey(k)); return v === null ? undefined : JSON.parse(v); } catch(e) { return undefined; } },
  _set(k, v) { try { localStorage.setItem(lsKey(k), JSON.stringify(v)); } catch(e) {} },
  // bracket-notation read used in prev-week lookups: store[fullKey]
  // We intercept this via a Proxy so existing code works unchanged
};

const storeProxy = new Proxy(store, {
  get(t, k) { if (k in t) return t[k]; return t._get(k); },
  set(t, k, v) { t._set(k, v); return true; }
});

// Replace store references with proxy
const _store = storeProxy;

function scopedKey(path) { return `d${currentDay}_w${currentWeek}_${path}`; }
function save(path, val) { _store._set(scopedKey(path), val); }
function load(path, def) {
  const v = _store._get(scopedKey(path));
  return v !== undefined ? v : def;
}

// weighInLog: persisted as a single JSON object
function loadWeighInLog() {
  try { return JSON.parse(localStorage.getItem(lsKey('weighIn')) || '{}'); } catch(e) { return {}; }
}
function saveWeighInLog(log) {
  try { localStorage.setItem(lsKey('weighIn'), JSON.stringify(log)); } catch(e) {}
}
let weighInLog = loadWeighInLog();

// Prev-week lookup used in circuit/assistance rendering
// store[`d${d}_w${w}_${path}`] — route through _store._get
function prevStore(fullKey) { return _store._get(fullKey); }

// ── DATA TOOLS ───────────────────────────────────────────────────────────────
function exportData() {
  const out = { version: 1, program: 'Dec25', exported: new Date().toISOString(), data: {}, weighIn: weighInLog };
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(LS_PREFIX)) {
      out.data[k.slice(LS_PREFIX.length)] = JSON.parse(localStorage.getItem(k));
    }
  }
  const blob = new Blob([JSON.stringify(out, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `full_spectrum_data_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const out = JSON.parse(e.target.result);
      if (out.data) Object.entries(out.data).forEach(([k, v]) => localStorage.setItem(lsKey(k), JSON.stringify(v)));
      if (out.weighIn) { localStorage.setItem(lsKey('weighIn'), JSON.stringify(out.weighIn)); weighInLog = out.weighIn; }
      renderDay();
      updateSessionCount();
      alert('Data imported successfully.');
    } catch(err) { alert('Import failed — check the file format.'); }
  };
  reader.readAsText(file);
}

function resetAllData() {
  if (!confirm('This will permanently delete ALL logged training data. Are you sure?')) return;
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(LS_PREFIX)) keys.push(k);
  }
  keys.forEach(k => localStorage.removeItem(k));
  weighInLog = {};
  renderDay();
  updateSessionCount();
}

function countSessions() {
  const seen = new Set();
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(LS_PREFIX)) {
      const inner = k.slice(LS_PREFIX.length);
      const m = inner.match(/^(d\d_w\d)_session_date$/);
      if (m) seen.add(m[1]);
    }
  }
  return seen.size;
}

function setWeek(w) {
  currentWeek = w;
  document.querySelectorAll('.wbtn').forEach((b,i)=>b.classList.toggle('active',i+1===w));
  mobTimer && clearInterval(mobTimer); mobRunning = false; mobRemaining = 300;
  renderDay();
}
function setDay(d) {
  currentDay = d;
  document.querySelectorAll('.dtab').forEach((b,i)=>b.classList.toggle('active',i===d));
  mobTimer && clearInterval(mobTimer); mobRunning = false; mobRemaining = 300;
  renderDay();
}

function renderDay() {
  if (currentWeek === null) {
    document.getElementById('content').innerHTML = `<div style="padding:48px 0;text-align:center;color:var(--muted)"><div style="font-family:'Saira Condensed',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px">Select a week above</div><div style="font-size:14px">Choose which week you're training</div></div>`;
    return;
  }
  const day = PROGRAM.days[currentDay];
  const wi = currentWeek - 1;
  let html = '';

  // WEIGH IN
  html += `<div class="sec-label">Weigh In</div>
  <div class="weigh-card">
    <div class="weigh-row">
      <div class="weigh-label">Body Weight</div>
      <div class="weigh-input-wrap">
        <input type="number" id="weighInput" step="0.1" placeholder="0.0" value="${weighInLog['d'+currentDay+'_w'+currentWeek]||''}" style="width:90px;font-size:20px;font-family:'Saira Condensed',sans-serif;font-weight:700;text-align:right;padding:8px 10px;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:6px;outline:none">
        <span class="weigh-unit">kg</span>
      </div>
      <button class="weigh-save" onclick="saveWeighIn()">Log</button>
    </div>
    <div class="weigh-hist" id="weighHist"></div>
  </div>`;

  // CARDIO
  const c = day.cardio;
  // Build previous session summary for header — use prev week same day, or prev day same week
  const prevCardioKey = (k) => `d${currentDay}_w${currentWeek > 1 ? currentWeek-1 : currentWeek}_cardio_${k}`;
  const prevCardioChips = c.keys.map((k, fi) => {
    const val = prevStore(prevCardioKey(fi));
    if (!val) return null;
    return `<span style="font-size:11px;color:var(--text)">${c.fields[fi].replace(/ \(.*\)/,'')}: <strong>${val}${c.units[fi]?'&thinsp;'+c.units[fi]:''}</strong></span>`;
  }).filter(Boolean);
  const prevCardioHtml = prevCardioChips.length > 0
    ? prevCardioChips.join('<span style="color:var(--border2);margin:0 4px">·</span>')
    : `<span style="font-size:11px;color:var(--muted)">${c.duration} · ${c.target}</span>`;

  html += `<div class="sec-label">Cardio</div>
  <div class="cardio-card">
    <div class="cardio-header">
      <span class="cardio-machine">${c.machine}</span>
      <span class="cardio-target" style="flex:1;margin-left:10px;line-height:1.4">${prevCardioHtml}</span>
    </div>
    <div class="cardio-fields">`;
  c.fields.forEach((f, fi) => {
    const saved = load(`cardio_${fi}`, '');
    html += `<div class="cardio-field"><label>${f}</label><input type="number" step="0.1" placeholder="—" value="${saved}" onchange="save('cardio_${fi}',this.value)"></div>`;
  });
  html += `</div></div>`;

  // MOBILITY
  if (day.mobility) {
    html += `<div class="sec-label">Mobility</div>
    <div class="mob-card">
      <div class="mob-name">${day.mobility}</div>
      <div class="mob-time-display" id="mobDisplay">5:00</div>
      <button class="mob-timer-btn" id="mobBtn" onclick="toggleMobTimer()">Start</button>
    </div>`;
  }

  // AUTO DATE STAMP
  const todayStr = new Date().toLocaleDateString('en-AU', { day:'2-digit', month:'2-digit', year:'2-digit' });
  if (!load('session_date', null)) save('session_date', todayStr);
  const sessionDate = load('session_date', todayStr);

  const p = day.primary;

  // PREVIOUS WEEK SUMMARY + INTENSITY RECOMMENDATION
  // recommendedWeight declared here so it's in scope for working weight calc below
  let recommendedWeight = null;
  let prevSummaryHtml = '';
  if (wi > 0) {
    const prevWi = wi - 1;
    const prevKey = (path) => `d${currentDay}_w${currentWeek-1}_${path}`;
    const prevWeight = prevStore(prevKey('primary_weight')) || p.weights[prevWi] || '—';
    const prevSets = p.sets[prevWi];
    const prevReps = Array.isArray(p.reps) ? p.reps[prevWi] : p.reps;
    const prevROLS = prevStore(prevKey('last_set_reps'));
    const prevRPE = prevStore(prevKey('last_set_rpe'));
    const prevDate = prevStore(prevKey('session_date')) || p.dates[prevWi] || '—';

    let recHtml = '';
    if (prevROLS && prevWeight && prevWeight !== '—') {
      const rols = parseInt(prevROLS);
      const targetReps = parseInt(Array.isArray(p.reps) ? p.reps[prevWi] : p.reps);
      const diff = rols - targetReps;
      const pw = parseFloat(prevWeight);
      if (diff >= 2) {
        const inc = diff >= 4 ? 5 : 2.5;
        recommendedWeight = pw + inc;
        recHtml = `<div style="margin-top:10px;padding:10px 12px;background:rgba(210,171,102,0.06);border:1px solid rgba(210,171,102,0.3);border-radius:8px">
          <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:5px">Recommendation</div>
          <div style="font-family:'Saira Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--accent)">Increase → ${recommendedWeight}kg</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">+${inc}kg · ROLS was ${diff} reps above target. Expect ~2 rep drop at new weight.</div>
        </div>`;
      } else if (diff < 0) {
        recommendedWeight = Math.max(0, pw - 2.5);
        recHtml = `<div style="margin-top:10px;padding:10px 12px;background:rgba(207,138,92,0.06);border:1px solid rgba(207,138,92,0.3);border-radius:8px">
          <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--superset-col);margin-bottom:5px">Recommendation</div>
          <div style="font-family:'Saira Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--superset-col)">Reduce → ${recommendedWeight}kg</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">−2.5kg · ROLS below target. Consolidate before progressing.</div>
        </div>`;
      } else {
        recommendedWeight = pw;
        recHtml = `<div style="margin-top:10px;padding:10px 12px;background:rgba(95,149,166,0.06);border:1px solid rgba(95,149,166,0.3);border-radius:8px">
          <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--accent3);margin-bottom:5px">Recommendation</div>
          <div style="font-family:'Saira Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--accent3)">Hold → ${recommendedWeight}kg</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px">ROLS within 2 reps of target — maintain weight and build quality.</div>
        </div>`;
      }
    } else {
      recHtml = `<div style="margin-top:8px;font-size:12px;color:var(--muted);font-style:italic">Log ROLS this week to get a recommendation for next week.</div>`;
    }

    prevSummaryHtml = `<div style="margin:0 14px 14px;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:8px">
      <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Week ${currentWeek-1} Summary</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
        <div><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Weight</div><div style="font-family:'Saira Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--text)">${prevWeight}<span style="font-size:12px;color:var(--muted)">kg</span></div></div>
        <div><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">Sets×Reps</div><div style="font-family:'Saira Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--text)">${prevSets}×${prevReps}</div></div>
        <div><div style="font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:3px">ROLS</div><div style="font-family:'Saira Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--accent)">${prevROLS||'—'}</div></div>
      </div>
      <div style="display:flex;gap:12px;margin-top:8px">
        ${prevRPE ? `<div style="font-size:12px;color:var(--muted)">RPE <span style="color:var(--text);font-weight:600">${prevRPE}</span></div>` : ''}
        <div style="font-size:12px;color:var(--muted)">Date <span style="color:var(--text)">${prevDate}</span></div>
      </div>
      ${recHtml}
    </div>`;
  }

  // PRIMARY variables — recommendedWeight now safely in scope
  const numSets = p.sets[wi];
  const repsVal = Array.isArray(p.reps) ? p.reps[wi] : p.reps;
  const fallbackWeight = parseFloat(p.weights[wi]) || parseFloat(p.weights[wi > 0 ? wi-1 : 0]) || 0;
  const autoDefault = recommendedWeight !== null ? recommendedWeight : fallbackWeight;
  const workingWeight = parseFloat(load('primary_weight', autoDefault)) || autoDefault || 0;

  html += `<div class="sec-label">Primary Lift</div>
  <div class="primary-card">
    <div class="primary-hdr">
      <span class="primary-lbl">Primary Lift</span>
      <span style="font-size:11px;color:rgba(0,0,0,0.5)">${sessionDate}</span>
    </div>
    <div class="primary-name">${p.name}</div>
    <div style="padding:0 14px 4px;display:flex;gap:12px">
      <div style="text-align:center"><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Sets</div><div style="font-family:'Saira Condensed',sans-serif;font-size:22px;font-weight:700">${numSets}</div></div>
      <div style="text-align:center"><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Reps</div><div style="font-family:'Saira Condensed',sans-serif;font-size:22px;font-weight:700">${repsVal}</div></div>
      <div style="text-align:center"><div style="font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px">Rest</div><div style="font-family:'Saira Condensed',sans-serif;font-size:22px;font-weight:700">2m</div></div>
    </div>
    <div class="weight-editor">
      <span class="we-label">Working Wt</span>
      <button class="we-adj" onclick="adjustWeight(-2.5)">−</button>
      <div class="we-input-wrap">
        <input type="number" id="weightInput" step="2.5" value="${workingWeight||''}" placeholder="kg" oninput="onWeightChange(this.value)" style="width:90px;font-size:22px;font-family:'Saira Condensed',sans-serif;font-weight:700;text-align:center;color:var(--accent);padding:6px 10px;background:var(--surface2);border:1px solid rgba(210,171,102,0.3);border-radius:6px;outline:none">
        <span class="we-unit">kg</span>
      </div>
      <button class="we-adj" onclick="adjustWeight(2.5)">+</button>
    </div>
    <div class="warmup-sets-block">
      <div class="ws-label">Warm-Up Sets</div>
      <div class="ws-rows" id="wuRows">${buildWarmupRows(workingWeight)}</div>
    </div>
    ${prevSummaryHtml}
    <div class="working-sets-block">
      <div class="wset-label">Working Sets</div>
      <div class="wset-rows">`;

  for (let s = 0; s < numSets; s++) {
    const isDone = load(`pset_${s}`, false);
    const isLast = s === numSets - 1;
    html += `<div class="wset-row ${isDone?'done':''}" id="wrow_${s}">
      <span class="wset-num">Set ${s+1}</span>
      <span class="wset-info">${workingWeight?workingWeight+'kg · ':''}${repsVal} reps${isLast?' <span style="color:var(--accent);font-size:11px">← record reps!</span>':''}</span>
      <button class="wset-done-btn ${isDone?'done':''}" id="psetbtn_${s}" onclick="markPrimarySet(${s},${numSets},${p.rest})">${isDone?'✓ Done':'Done'}</button>
    </div>`;
  }
  html += `</div></div>`; // close wset-rows + working-sets-block

  // Last set recorder — sits inside primary-card
  const lsReps = load('last_set_reps', '');
  const lsRpe = load('last_set_rpe', null);
  html += `<div class="last-set-recorder">
    <div class="lsr-title">Last Set — Record Reps &amp; Intensity</div>
    <div class="lsr-row">
      <label>Reps achieved</label>
      <input type="number" id="lsRepsInput" placeholder="e.g. 9" value="${lsReps}" oninput="save('last_set_reps',this.value)" style="width:80px;font-size:16px;font-weight:700;font-family:'Saira Condensed',sans-serif;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:6px 10px;outline:none">
    </div>
    <div style="margin-top:8px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:6px">RPE</div>
    <div class="lsr-rpe">`;
  [6,7,7.5,8,8.5,9,9.5,10].forEach(r => {
    html += `<button class="rpe-btn ${lsRpe==r?'sel':''}" onclick="setRpe(${r})">${r}</button>`;
  });
  html += `</div>`; // close lsr-rpe
  if (wi > 0 && p.maxReps[wi-1]) {
    html += `<div class="lsr-hint">Prev week last set: ${p.maxReps[wi-1]} reps</div>`;
  }
  html += `</div>`; // close last-set-recorder
  html += `</div>`; // close primary-card

  // ASSISTANCE
  html += `<div class="sec-label">Assistance Exercises</div>`;

  day.assistance.forEach((block, bi) => {
    if (block.type === 'superset') {
      const numRounds = block.exercises[0].sets || 3;
      html += `<div class="superset-block">
        <div class="ss-hdr"><span class="ss-pill">Superset</span><span class="ss-note">${numRounds} rounds · Ex 1 → Ex 2 → Rest ${block.rest}s</span></div>`;

      // Show each exercise info + previous logs at top
      block.exercises.forEach((ex, ei) => {
        // Build previous performance string
        let prevDisplay = '';
        if (wi === 0) {
          // Week 1: show spreadsheet historical log if available
          const histLog = ex.log && ex.log[wi] ? ex.log[wi] : null;
          if (histLog) prevDisplay = `<div style="font-size:11px;color:#555;font-style:italic;margin-top:4px">Last programme: ${histLog}</div>`;
        } else {
          // Week 2+: build from app-recorded data of previous week
          const numR = ex.sets || 3;
          const sets = [];
          for (let s = 0; s < numR; s++) {
            const skey = `b${bi}_e${ei}_s${s}`;
            const pw = prevStore(`d${currentDay}_w${currentWeek-1}_${skey}_w`);
            const pr = prevStore(`d${currentDay}_w${currentWeek-1}_${skey}_r`);
            if (pr !== undefined && pr !== '') sets.push({ w: pw||null, r: pr });
          }
          if (sets.length > 0) {
            // Group consecutive sets with same weight into weight(r1,r2,...) chunks
            const chunks = [];
            let i = 0;
            while (i < sets.length) {
              const curW = sets[i].w;
              const reps = [sets[i].r];
              let j = i + 1;
              while (j < sets.length && sets[j].w === curW) {
                reps.push(sets[j].r);
                j++;
              }
              chunks.push({ w: curW, reps });
              i = j;
            }
            const formatted = chunks.map(ch => {
              const wStr = ch.w ? `${ch.w}kg` : '';
              const rStr = `(${ch.reps.join(', ')})`;
              return wStr ? `${wStr} ${rStr}` : rStr;
            }).join(' ');
            prevDisplay = `<div style="font-family:'Saira Condensed',sans-serif;font-size:14px;font-weight:600;letter-spacing:0.5px;color:var(--muted2);margin-top:4px">${formatted}</div>`;
          } else {
            const histLog = ex.log && ex.log[wi-1] ? ex.log[wi-1] : null;
            if (histLog) prevDisplay = `<div style="font-size:11px;color:#555;font-style:italic;margin-top:4px">Prev: ${histLog}</div>`;
          }
        }
        html += `<div class="ex-card" style="border-bottom:1px solid var(--border)">
          <div class="ex-top">
            <div class="ex-name">${ex.name}</div>
            <button class="ex-gif-btn" onclick="showGif('${ex.name}')">▶</button>
          </div>
          <div class="ex-meta">
            ${ex.reps ? `<span class="meta-chip hi">${ex.reps} reps</span>` : ''}
          </div>
          ${prevDisplay}
        </div>`;
      });

      // Rounds: each round = log both exercises, then rest button
      html += `<div style="padding:12px 14px">
        <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:10px">Log each round</div>`;

      for (let s = 0; s < numRounds; s++) {
        const roundDone = load(`b${bi}_round${s}_done`, false);
        html += `<div style="margin-bottom:10px;padding:10px;background:var(--surface2);border:1px solid ${roundDone?'rgba(207,138,92,0.4)':'var(--border)'};border-radius:8px" id="ssround_${bi}_${s}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <span style="font-family:'Saira Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;color:${roundDone?'var(--superset-col)':'var(--muted)'}">Round ${s+1}</span>
            ${roundDone?`<span style="font-size:12px;color:var(--superset-col)">✓ Done · Rest started</span>`:''}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px">`;

        block.exercises.forEach((ex, ei) => {
          const skey = `b${bi}_e${ei}_s${s}`;
          const wval = load(`${skey}_w`, '');
          const rval = load(`${skey}_r`, '');
          html += `<div>
            <div style="font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">${ex.name.length>14?ex.name.substring(0,14)+'…':ex.name}</div>
            <div style="display:flex;gap:4px">
              <input type="number" placeholder="kg" value="${wval}" oninput="save('${skey}_w',this.value)" style="width:56px;font-size:13px;padding:5px 6px;text-align:center;background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:5px;outline:none">
              <input type="number" placeholder="reps" value="${rval}" oninput="save('${skey}_r',this.value)" style="width:56px;font-size:13px;padding:5px 6px;text-align:center;background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:5px;outline:none">
            </div>
          </div>`;
        });

        html += `</div>
          <button onclick="completeSSRound(${bi},${s},${block.rest},${numRounds})" ${roundDone?'disabled':''} style="width:100%;padding:8px;background:${roundDone?'transparent':'var(--superset-col)'};border:1px solid ${roundDone?'var(--border)':'var(--superset-col)'};color:${roundDone?'var(--muted)':'#000'};font-family:'Saira Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:6px;cursor:${roundDone?'default':'pointer'}">
            ${roundDone?'✓ Complete':'Done — Start Rest'}
          </button>
        </div>`;
      }

      html += `</div></div>`;

    } else if (block.type === 'circuit') {
      const prevTime = prevStore(`d${currentDay}_w${currentWeek-1}_circ${bi}_time`) || (block.log && block.log[wi > 0 ? wi-1 : 0]) || null;
      const thisTime = load(`circ${bi}_time`, '');
      const circState = load(`circ${bi}_state`, 'idle'); // idle | running | done
      const activeEx  = load(`circ${bi}_activeEx`, 0);
      const activeRound = load(`circ${bi}_activeRound`, 0);

      html += `<div class="circuit-block" id="circBlock_${bi}">
        <div class="circ-hdr">
          <span class="circ-pill">Circuit</span>
          <span style="font-family:'Saira Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--circuit-col)">${block.rounds.join(' · ')} reps</span>
          ${prevTime ? `<span style="font-size:11px;color:var(--muted);margin-left:auto">Prev: ${prevTime}</span>` : ''}
        </div>`;

      // Difficulty inputs — one row per exercise
      html += `<div style="padding:10px 14px 4px;border-bottom:1px solid var(--border)">
        <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Load / Difficulty</div>`;
      block.exercises.forEach((ex, ei) => {
        const diffVal = load(`circ${bi}_ex${ei}_diff`, '');
        const prevDiff = prevStore(`d${currentDay}_w${currentWeek-1}_circ${bi}_ex${ei}_diff`) || '';
        html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
          <div style="font-family:'Saira Condensed',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;flex:1;line-height:1">${ex.name}</div>
          <div style="font-size:11px;color:var(--muted);white-space:nowrap">${ex.diffLabel}${ex.diffUnit?' ('+ex.diffUnit+')':''}</div>
          <input type="text" placeholder="${ex.diffPlaceholder}" value="${diffVal}"
            oninput="save('circ${bi}_ex${ei}_diff',this.value)"
            style="width:90px;font-size:13px;padding:5px 8px;text-align:center;background:var(--surface2);border:1px solid var(--border2);color:var(--text);border-radius:6px;outline:none">
          ${prevDiff ? `<span style="font-size:11px;color:var(--muted);white-space:nowrap">Prev: ${prevDiff}</span>` : ''}
        </div>`;
      });
      html += `</div>`;

      // Stopwatch display
      html += `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid var(--border)">
        <div style="flex:1">
          <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Elapsed Time</div>
          <div id="circTimer_${bi}" style="font-family:'Saira Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--circuit-col);line-height:1">${thisTime||'0:00'}</div>
        </div>
        ${circState==='done'
          ? `<div style="text-align:right">
              <div style="font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px">Time recorded</div>
              <div style="font-family:'Saira Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--accent)">${thisTime}</div>
            </div>`
          : circState==='running'
            ? `<button onclick="finishCircuit(${bi})" style="padding:10px 16px;background:var(--accent);border:none;color:#000;font-family:'Saira Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:8px">Finish</button>`
            : `<button onclick="startCircuit(${bi})" style="padding:10px 20px;background:var(--circuit-col);border:none;color:#000;font-family:'Saira Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;border-radius:8px">Start</button>`
        }
      </div>`;

      // Exercise step-through grid
      html += `<div style="padding:10px 14px 4px">
        <div style="font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px">Tap to advance through circuit</div>`;

      block.exercises.forEach((ex, ei) => {
        const exDone = circState === 'running'
          ? (ei < activeEx || (ei === activeEx && activeRound >= block.rounds.length))
          : circState === 'done';
        const isActive = circState === 'running' && ei === activeEx && activeRound < block.rounds.length;
        const curRound = isActive ? activeRound : (circState === 'running' && ei < activeEx ? block.rounds.length : 0);

        html += `<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border)">
          <div style="width:8px;height:8px;border-radius:50%;background:${isActive?'var(--circuit-col)':exDone?'rgba(95,149,166,0.3)':'var(--border)'};flex-shrink:0;margin-top:2px"></div>
          <div style="font-family:'Saira Condensed',sans-serif;font-size:17px;font-weight:700;text-transform:uppercase;flex:1;color:${isActive?'var(--text)':exDone?'var(--muted)':'var(--muted)'}">${ex.name}</div>
          <div style="display:flex;gap:5px">`;

        block.rounds.forEach((r, ri) => {
          const chipDone = circState === 'done' || (circState === 'running' && (ei < activeEx || (ei === activeEx && ri < activeRound)));
          const chipActive = isActive && ri === activeRound;
          html += `<button
            id="rchip_${bi}_${ei}_${ri}"
            onclick="advanceCircuit(${bi},${ei},${ri})"
            ${!chipActive?'disabled':''}
            style="width:36px;height:36px;border-radius:8px;border:1.5px solid ${chipActive?'var(--circuit-col)':chipDone?'rgba(95,149,166,0.3)':'var(--border)'};background:${chipDone?'rgba(95,149,166,0.15)':chipActive?'rgba(95,149,166,0.1)':'transparent'};color:${chipActive?'var(--circuit-col)':chipDone?'rgba(95,149,166,0.5)':'var(--muted)'};font-family:'Saira Condensed',sans-serif;font-size:14px;font-weight:700;cursor:${chipActive?'pointer':'default'};transition:all 0.15s;${chipActive?'box-shadow:0 0 0 2px rgba(95,149,166,0.25)':''}">${r}</button>`;
        });

        html += `</div></div>`;
      });

      html += `</div>`; // close step-through grid

      // Manual time entry if not using stopwatch
      if (circState !== 'running' && circState !== 'done') {
        html += `<div style="padding:10px 14px 14px;display:flex;align-items:center;gap:10px;border-top:1px solid var(--border)">
          <div style="font-size:11px;color:var(--muted);flex:1">Or record time manually</div>
          <input type="text" placeholder="e.g. 12:45" value="${thisTime}"
            oninput="save('circ${bi}_time',this.value);document.getElementById('circTimer_${bi}').textContent=this.value"
            style="width:90px;font-size:15px;font-family:'Saira Condensed',sans-serif;font-weight:700;padding:6px 10px;text-align:center;background:var(--surface2);border:1px solid var(--border2);color:var(--circuit-col);border-radius:6px;outline:none">
        </div>`;
      }

      html += `</div>`; // close circuit-block
    }
  });

  document.getElementById('content').innerHTML = html;
  renderWeighGraph();
}

function buildWarmupRows(ww) {
  const w = parseFloat(ww);
  const day = PROGRAM.days[currentDay];
  const wuType = day.primary.warmupType || 'barbell';
  const openerLabel = wuType === 'barbell' ? 'Bar' : 'BW';
  const openerNote = wuType === 'barbell' ? '20 kg' : 'bodyweight';

  const openerDone = load('wu_opener', false);
  let rows = `<div class="ws-row">
    <span class="ws-pct" style="color:var(--muted);font-size:11px">OPENER</span>
    <span class="ws-weight" style="font-size:15px">${openerLabel}</span>
    <span class="ws-reps">× 20 reps &nbsp;<span style="color:var(--muted);font-size:11px">${openerNote}</span></span>
    <button class="ws-check ${openerDone?'done':''}" id="wuc_opener" onclick="markWarmupSet('opener')"></button>
  </div>`;

  if (!w || w <= 0) {
    rows += `<div style="font-size:12px;color:var(--muted);padding:6px 2px">Enter working weight above for percentage warm-up sets</div>`;
    return rows;
  }

  const sets = [{ pct:40, reps:10 }, { pct:60, reps:8 }, { pct:80, reps:5 }];
  rows += sets.map((s, i) => {
    const wuWeight = Math.round(w * s.pct / 100 * 2) / 2;
    const isDone = load(`wu_${i}`, false);
    return `<div class="ws-row">
      <span class="ws-pct">${s.pct}%</span>
      <span class="ws-weight">${wuWeight} kg</span>
      <span class="ws-reps">${s.reps} reps</span>
      <button class="ws-check ${isDone?'done':''}" id="wuc_${i}" onclick="markWarmupSet(${i})"></button>
    </div>`;
  }).join('');
  return rows;
}

function onWeightChange(val) {
  save('primary_weight', val);
  const w = parseFloat(val) || 0;
  document.getElementById('wuRows').innerHTML = buildWarmupRows(w);
  document.querySelectorAll('.wset-info').forEach((el, i) => {
    const day = PROGRAM.days[currentDay];
    const wi = currentWeek - 1;
    const repsVal = Array.isArray(day.primary.reps) ? day.primary.reps[wi] : day.primary.reps;
    const numSets = day.primary.sets[wi];
    const isLast = i === numSets - 1;
    if (i < numSets) {
      el.innerHTML = `${w?w+'kg · ':''}${repsVal} reps${isLast?' <span style="color:var(--accent);font-size:11px">← record reps!</span>':''}`;
    }
  });
}

function adjustWeight(delta) {
  const inp = document.getElementById('weightInput');
  const cur = parseFloat(inp.value) || 0;
  const nw = Math.max(0, cur + delta);
  inp.value = nw;
  onWeightChange(nw);
}

function markWarmupSet(i) {
  save(`wu_${i}`, true);
  const btn = document.getElementById(i === 'opener' ? 'wuc_opener' : `wuc_${i}`);
  if (btn) btn.classList.add('done');
}

function markPrimarySet(s, total, restSecs) {
  save(`pset_${s}`, true);
  const btn = document.getElementById(`psetbtn_${s}`);
  const row = document.getElementById(`wrow_${s}`);
  if (btn) { btn.classList.add('done'); btn.textContent = '✓ Done'; btn.disabled = true; }
  if (row) row.classList.add('done');
  if (s === total - 1) {
    document.getElementById('lsRepsInput') && document.getElementById('lsRepsInput').focus();
  }
  startRest(restSecs);
}

function completeSSRound(bi, roundIdx, restSecs, totalRounds) {
  save(`b${bi}_round${roundIdx}_done`, true);
  const roundEl = document.getElementById(`ssround_${bi}_${roundIdx}`);
  if (roundEl) {
    roundEl.style.borderColor = 'rgba(207,138,92,0.4)';
    const btn = roundEl.querySelector('button');
    if (btn) { btn.textContent = '✓ Complete'; btn.disabled = true; btn.style.background = 'transparent'; btn.style.color = 'var(--muted)'; btn.style.borderColor = 'var(--border)'; }
    const lbl = roundEl.querySelector('span');
    if (lbl) lbl.style.color = 'var(--superset-col)';
  }
  startRest(restSecs);
}

// CIRCUIT STATE MACHINE
let circStopwatch = null;
let circStartTime = null;
let circElapsed = 0; // seconds

function startCircuit(bi) {
  save(`circ${bi}_state`, 'running');
  save(`circ${bi}_activeEx`, 0);
  save(`circ${bi}_activeRound`, 0);
  circElapsed = 0;
  circStartTime = Date.now();
  if (circStopwatch) clearInterval(circStopwatch);
  circStopwatch = setInterval(() => {
    circElapsed = Math.floor((Date.now() - circStartTime) / 1000);
    const el = document.getElementById(`circTimer_${bi}`);
    if (el) el.textContent = fmtTime(circElapsed);
  }, 500);
  renderDay();
}

function advanceCircuit(bi, ei, ri) {
  const block = PROGRAM.days[currentDay].assistance[bi];
  const totalEx = block.exercises.length;
  const totalRounds = block.rounds.length;

  // Mark this chip done, move to next exercise
  const nextEi = ei + 1;
  if (nextEi < totalEx) {
    // More exercises in this round — advance to next exercise, same round index
    save(`circ${bi}_activeEx`, nextEi);
    save(`circ${bi}_activeRound`, ri);
  } else {
    // Finished all exercises for this rep count — move to next round
    const nextRi = ri + 1;
    if (nextRi < totalRounds) {
      save(`circ${bi}_activeEx`, 0);
      save(`circ${bi}_activeRound`, nextRi);
    } else {
      // All done — auto-finish
      finishCircuit(bi);
      return;
    }
  }

  // Update chips without full re-render for smoothness
  const newEx  = load(`circ${bi}_activeEx`, 0);
  const newRound = load(`circ${bi}_activeRound`, 0);

  // Disable old chip, enable new one
  const oldChip = document.getElementById(`rchip_${bi}_${ei}_${ri}`);
  if (oldChip) {
    oldChip.disabled = true;
    oldChip.style.background = 'rgba(95,149,166,0.15)';
    oldChip.style.borderColor = 'rgba(95,149,166,0.3)';
    oldChip.style.color = 'rgba(95,149,166,0.5)';
    oldChip.style.boxShadow = '';
  }
  const newChip = document.getElementById(`rchip_${bi}_${newEx}_${newRound}`);
  if (newChip) {
    newChip.disabled = false;
    newChip.style.background = 'rgba(95,149,166,0.1)';
    newChip.style.borderColor = 'var(--circuit-col)';
    newChip.style.color = 'var(--circuit-col)';
    newChip.style.boxShadow = '0 0 0 2px rgba(95,149,166,0.25)';
  }

  // Update exercise indicator dots
  block.exercises.forEach((_, idx) => {
    const dot = document.querySelector(`#circBlock_${bi} [data-exdot="${idx}"]`);
    if (dot) dot.style.background = idx === newEx ? 'var(--circuit-col)' : idx < newEx ? 'rgba(95,149,166,0.3)' : 'var(--border)';
  });
}

function finishCircuit(bi) {
  if (circStopwatch) { clearInterval(circStopwatch); circStopwatch = null; }
  circElapsed = circStartTime ? Math.floor((Date.now() - circStartTime) / 1000) : circElapsed;
  const timeStr = fmtTime(circElapsed);
  save(`circ${bi}_time`, timeStr);
  save(`circ${bi}_state`, 'done');
  renderDay();
}

function fmtTime(secs) {
  const m = Math.floor(secs / 60), s = secs % 60;
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function setRpe(val) {
  save('last_set_rpe', val);
  document.querySelectorAll('.rpe-btn').forEach(b => b.classList.toggle('sel', parseFloat(b.textContent) === val));
}

// MOBILITY TIMER
function toggleMobTimer() {
  if (!mobRunning && mobRemaining <= 0) { mobRemaining = 300; }
  if (mobRunning) {
    clearInterval(mobTimer); mobRunning = false;
    document.getElementById('mobBtn').textContent = 'Resume';
    document.getElementById('mobBtn').classList.remove('running');
  } else {
    mobRunning = true;
    document.getElementById('mobBtn').textContent = 'Pause';
    document.getElementById('mobBtn').classList.add('running');
    mobTimer = setInterval(() => {
      mobRemaining--;
      updateMobDisplay();
      if (mobRemaining <= 0) {
        clearInterval(mobTimer); mobRunning = false;
        document.getElementById('mobBtn').textContent = 'Done';
        document.getElementById('mobBtn').classList.remove('running');
        document.getElementById('mobBtn').classList.add('done');
        document.getElementById('mobDisplay').textContent = '0:00';
        if ('vibrate' in navigator) navigator.vibrate([200,100,200]);
      }
    }, 1000);
  }
}
function updateMobDisplay() {
  const el = document.getElementById('mobDisplay');
  if (!el) return;
  const m = Math.floor(mobRemaining/60), s = mobRemaining%60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

// REST TIMER
function startRest(secs) {
  if (restTimer) clearInterval(restTimer);
  restRemaining = secs; restTotal = secs;
  document.getElementById('restBar').classList.remove('hidden');
  updateRestDisplay();
  restTimer = setInterval(() => {
    restRemaining--;
    if (restRemaining <= 0) {
      clearInterval(restTimer); restTimer = null;
      document.getElementById('restBar').classList.add('hidden');
      if ('vibrate' in navigator) navigator.vibrate([200,100,200]);
    } else updateRestDisplay();
  }, 1000);
}
function updateRestDisplay() {
  const m = Math.floor(restRemaining/60), s = restRemaining%60;
  document.getElementById('restCd').textContent = `${m}:${s.toString().padStart(2,'0')}`;
  document.getElementById('restFill').style.width = (restRemaining/restTotal*100)+'%';
}
function skipRest() {
  if (restTimer) clearInterval(restTimer); restTimer = null;
  document.getElementById('restBar').classList.add('hidden');
}

// WEIGH IN
function saveWeighIn() {
  const val = parseFloat(document.getElementById('weighInput').value);
  if (!val) return;
  weighInLog[`d${currentDay}_w${currentWeek}`] = val;
  saveWeighInLog(weighInLog);
  renderWeighGraph();
}

function renderWeighGraph() {
  const hist = document.getElementById('weighHist');
  if (!hist) return;
  const points = [];
  for (let w = 1; w <= 4; w++) {
    for (let d = 0; d < 4; d++) {
      const v = weighInLog[`d${d}_w${w}`];
      if (v) points.push({ label: `W${w}D${d+1}`, val: v });
    }
  }
  if (points.length < 2) {
    hist.innerHTML = `<div style="font-size:11px;color:var(--muted);margin-top:8px">Log weight on multiple days to see your trend</div>`;
    return;
  }
  hist.innerHTML = `<div class="weigh-chart-wrap"><canvas id="weighChart"></canvas></div>`;
  setTimeout(() => {
    const ctx = document.getElementById('weighChart');
    if (!ctx) return;
    if (ctx._chart) ctx._chart.destroy();
    const vals = points.map(p => p.val);
    const mn = Math.min(...vals) - 1, mx = Math.max(...vals) + 1;
    ctx._chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: points.map(p => p.label),
        datasets: [{
          data: vals,
          borderColor: cssVar('--gold'),
          backgroundColor: cssVar('--gold')+'22',
          borderWidth: 2,
          pointBackgroundColor: cssVar('--gold'),
          pointRadius: 4,
          tension: 0.3,
          fill: true
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw + ' kg' } } },
        scales: {
          x: { ticks: { color: cssVar('--muted'), font: { size: 10 } }, grid: { color: cssVar('--border') } },
          y: { min: mn, max: mx, ticks: { color: cssVar('--muted'), font: { size: 10 }, callback: v => v+'kg' }, grid: { color: cssVar('--border') } }
        }
      }
    });
  }, 50);
}

function showGif(name) {
  document.getElementById('modalTitle').textContent = name;
  document.getElementById('modalOv').classList.add('show');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOv')) document.getElementById('modalOv').classList.remove('show');
}

function updateSessionCount() {
  const el = document.getElementById('sessionCount');
  if (el) {
    const n = countSessions();
    el.textContent = n === 0 ? 'No sessions logged yet' : `${n} of 16 sessions logged`;
  }
}

renderDay();
updateSessionCount();
</script>
<div class="fs-datapanel">
  <div class="fs-datapanel-label">Data &amp; Storage</div>
  <div class="fs-datapanel-row">
    <div id="sessionCount" class="fs-sessioncount"></div>
    <button onclick="exportData()" class="fs-databtn">Export JSON</button>
    <label class="fs-databtn">Import<input type="file" accept=".json" onchange="importData(this.files[0])" style="display:none"></label>
    <button onclick="resetAllData()" class="fs-databtn danger">Reset</button>
  </div>
  <div class="fs-datanote">Data saved locally on this device. Use Export before switching devices or starting Program&nbsp;2.</div>
</div>
<script>
/* ===== FULL SPECTRUM — additive UI layer (no training-data changes) ===== */
function cssVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim()||'#d2ab66';}
function fsGet(k,d){try{var v=localStorage.getItem('fsUI_'+k);return v===null?d:JSON.parse(v);}catch(e){return d;}}
function fsSet(k,v){try{localStorage.setItem('fsUI_'+k,JSON.stringify(v));}catch(e){}}

// Fill every Atlas mark from the embedded data-URI
document.querySelectorAll('[data-fs-atlas]').forEach(function(i){i.src=window.FS_ROUNDEL;});

// ---- Theme toggle (presentational) ----
function fsSyncThemeGlyph(){var b=document.getElementById('themeToggle');if(b)b.textContent=(document.documentElement.getAttribute('data-theme')==='light')?'\u2600':'\u263e';}
function fsToggleTheme(){
  var light=document.documentElement.getAttribute('data-theme')==='light';
  if(light){document.documentElement.removeAttribute('data-theme');fsSet('theme','dark');}
  else{document.documentElement.setAttribute('data-theme','light');fsSet('theme','light');}
  var m=document.querySelector('meta[name="theme-color"]');if(m)m.setAttribute('content',light?'#141f25':'#f1ede4');
  fsSyncThemeGlyph();
  if(typeof currentWeek!=='undefined'&&currentWeek!==null&&typeof renderWeighGraph==='function'){try{renderWeighGraph();}catch(e){}}
}
fsSyncThemeGlyph();

// ---- Home state ----
var fsWeek=fsGet('lastWeek',1), fsDay=fsGet('lastDay',null);
function fsSessionDone(d,w){try{return localStorage.getItem('fst_d'+d+'_w'+w+'_session_date')!==null;}catch(e){return false;}}
function fsNextDay(w){for(var i=0;i<4;i++){if(!fsSessionDone(i,w))return i;}return 0;} // first not-yet-opened day
function fsWeekProgress(w){var n=0;for(var i=0;i<4;i++)if(fsSessionDone(i,w))n++;return n;}
function fsLatestWeight(){var last=null;for(var w=1;w<=4;w++)for(var d=0;d<4;d++){var v=weighInLog['d'+d+'_w'+w];if(v)last=v;}return last;}

function fsRenderHome(){
  var day=fsDay===null?fsNextDay(fsWeek):fsDay;
  fsDay=day;
  var p=PROGRAM.days[day], c=p.cardio;
  var exCount=0; p.assistance.forEach(function(b){exCount+=(b.exercises?b.exercises.length:0);});
  var prog=fsWeekProgress(fsWeek);
  var wt=fsLatestWeight();
  var pills='';for(var w=1;w<=4;w++)pills+='<button class="fs-wpill'+(w===fsWeek?' on':'')+'" onclick="fsSelectWeek('+w+')">W'+w+'</button>';
  var pips='';for(var i=0;i<4;i++){var dp=PROGRAM.days[i];pips+='<button class="fs-dpip'+(i===day?' on':'')+'" onclick="fsSelectDay('+i+')">'+
    '<div style="font-family:\'Archivo\',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;color:'+(i===day?'var(--gold)':'var(--muted2)')+'">DAY '+(i+1)+'</div>'+
    '<div style="font-family:\'Saira Condensed\',sans-serif;font-style:italic;font-weight:800;font-size:13px;text-transform:uppercase;color:var(--text);margin-top:3px;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+dp.primary.name+'</div>'+
    (fsSessionDone(i,fsWeek)?'<div style="font-size:9px;color:var(--gold);margin-top:3px">\u2713 opened</div>':'<div style="font-size:9px;color:var(--faint);margin-top:3px">&nbsp;</div>')+'</button>';}
  var barsW='';for(var b=0;b<4;b++)barsW+='<div style="flex:1;height:6px;border-radius:3px;background:'+(b<prog?'var(--gold)':'var(--border)')+'"></div>';

  document.getElementById('fsHome').innerHTML=
  '<img src="'+window.FS_ROUNDEL+'" style="position:absolute;right:-72px;top:150px;width:330px;opacity:.05;pointer-events:none">'+
  '<div style="padding:22px 22px 40px;position:relative">'+
    '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:26px">'+
      '<div class="logo-lock" style="cursor:default"><img data-fs-atlas src="'+window.FS_ROUNDEL+'" class="logo-mark"><span class="logo-wm">Full Spectrum</span></div>'+
      '<button class="theme-toggle" onclick="fsToggleTheme()" aria-label="Toggle theme">'+(document.documentElement.getAttribute('data-theme')==='light'?'\u2600':'\u263e')+'</button>'+
    '</div>'+
    '<div style="font-family:\'Archivo\',sans-serif;font-weight:800;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2)">Dec \u201925 Program</div>'+
    '<div style="font-family:\'Archivo\',sans-serif;font-weight:800;font-size:26px;line-height:1.15;color:var(--text);margin:6px 0 20px">Ready to train?</div>'+

    '<div style="border-radius:20px;overflow:hidden;background:linear-gradient(150deg,var(--surface2),var(--surface));border:1px solid var(--gold);box-shadow:0 16px 40px -18px rgba(0,0,0,.55)">'+
      '<div style="padding:15px 18px 3px;display:flex;justify-content:space-between;align-items:center">'+
        '<span style="font-family:\'Archivo\',sans-serif;font-weight:800;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold)">Up Next \u00b7 Week '+fsWeek+'</span>'+
        '<span style="font-family:\'Hanken Grotesk\',sans-serif;font-weight:700;font-size:12px;color:var(--muted2)">Day '+(day+1)+' of 4</span>'+
      '</div>'+
      '<div style="padding:2px 18px 0"><div style="font-family:\'Saira Condensed\',sans-serif;font-style:italic;font-weight:900;font-size:36px;text-transform:uppercase;line-height:.95;color:var(--text)">'+p.primary.name+'</div></div>'+
      '<div style="padding:10px 18px 0;display:flex;gap:8px;flex-wrap:wrap">'+
        '<span style="background:rgba(210,171,102,.14);color:var(--gold);font-family:\'Hanken Grotesk\',sans-serif;font-weight:700;font-size:12px;padding:4px 10px;border-radius:6px">'+c.machine+' \u00b7 '+c.duration+'</span>'+
        '<span style="background:var(--surface3);color:var(--muted2);font-family:\'Hanken Grotesk\',sans-serif;font-weight:700;font-size:12px;padding:4px 10px;border-radius:6px">'+exCount+' assistance</span>'+
        (p.mobility?'<span style="background:rgba(168,137,166,.16);color:var(--warm-col);font-family:\'Hanken Grotesk\',sans-serif;font-weight:700;font-size:12px;padding:4px 10px;border-radius:6px">Mobility</span>':'')+
      '</div>'+
      '<button class="fs-hero-btn" onclick="fsStartSession()">Start Session \u203a</button>'+
    '</div>'+

    '<div style="font-family:\'Archivo\',sans-serif;font-weight:800;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin:22px 0 9px">Choose week</div>'+
    '<div style="display:flex;gap:7px">'+pills+'</div>'+
    '<div style="font-family:\'Archivo\',sans-serif;font-weight:800;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted2);margin:18px 0 9px">Pick a day</div>'+
    '<div style="display:flex;gap:7px">'+pips+'</div>'+

    '<div style="display:flex;gap:12px;margin-top:22px">'+
      '<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px">'+
        '<div style="font-family:\'Archivo\',sans-serif;font-weight:800;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)">Latest weight</div>'+
        '<div style="display:flex;align-items:baseline;gap:4px;margin-top:6px"><span style="font-family:\'Saira Condensed\',sans-serif;font-weight:800;font-size:32px;color:var(--text);line-height:1">'+(wt||'\u2014')+'</span><span style="font-family:\'Hanken Grotesk\',sans-serif;font-size:13px;color:var(--muted2)">'+(wt?'kg':'')+'</span></div>'+
      '</div>'+
      '<div style="flex:1;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:14px">'+
        '<div style="font-family:\'Archivo\',sans-serif;font-weight:800;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted2)">This week</div>'+
        '<div style="display:flex;align-items:baseline;gap:4px;margin-top:6px"><span style="font-family:\'Saira Condensed\',sans-serif;font-weight:800;font-size:32px;color:var(--text);line-height:1">'+prog+'</span><span style="font-family:\'Hanken Grotesk\',sans-serif;font-size:13px;color:var(--muted2)">/ 4 opened</span></div>'+
        '<div style="display:flex;gap:5px;margin-top:12px">'+barsW+'</div>'+
      '</div>'+
    '</div>'+
  '</div>';
}
function fsSelectWeek(w){fsWeek=w;fsDay=null;fsSet('lastWeek',w);fsRenderHome();}
function fsSelectDay(d){fsDay=d;fsSet('lastDay',d);fsRenderHome();}
function fsStartSession(){
  fsSet('lastWeek',fsWeek);fsSet('lastDay',fsDay);
  var h=document.getElementById('fsHome');h.classList.add('hide');
  setTimeout(function(){h.style.display='none';h.classList.remove('hide');},360);
  setWeek(fsWeek);setDay(fsDay);
  window.scrollTo(0,0);
}
function fsOpenHome(){fsRenderHome();var h=document.getElementById('fsHome');h.style.display='block';h.scrollTop=0;}

// ---- Splash sequence ----
(function(){
  var sp=document.getElementById('fsSplash');
  function reveal(){ if(sp.classList.contains('hide'))return; sp.classList.add('hide'); fsRenderHome(); document.getElementById('fsHome').style.display='block'; setTimeout(function(){sp.style.display='none';},600); }
  sp.addEventListener('click',reveal);
  setTimeout(reveal,2000);
})();
</script>

</body>
